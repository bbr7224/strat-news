name: Update Strat Data (EOD)

on:
  schedule:
    - cron: '15 22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Fetch EOD data
        run: python fetch_eod.py --sp500 --out strat_data.json
      - name: Commit & push if changed
        run: |
          git config user.name  "strat-bot"
          git config user.email "actions@users.noreply.github.com"
          git add strat_data.json
          git diff --cached --quiet && echo "No changes" || git commit -m "EOD data $(date -u +%F)"
          git push
